# Inventaire minimal : un groupe `monitors` désignant les hôtes qui exécuteront
# Beacon. Ici l'hôte de contrôle se déploie lui-même (connection: local) ; en
# situation réelle, on remplace `localhost` par une VM accessible en SSH.
#
# Aucun secret ici : le token d'authentification est fourni par l'environnement
# de l'hôte (voir group_vars), jamais inscrit dans l'inventaire versionné.

[monitors]
localhost ansible_connection=local
